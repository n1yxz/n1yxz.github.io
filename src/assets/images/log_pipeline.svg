<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171c28"/>
      <stop offset="100%" stop-color="#1f2438"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg2)"/>

  <!-- Pipeline nodes -->
  <g font-family="Arial, sans-serif">
    <!-- Node 1: Logs -->
    <rect x="35" y="70" width="86" height="60" rx="10" fill="#232941" stroke="#6c63ff" stroke-width="2"/>
    <circle cx="78" cy="92" r="9" fill="#6c63ff"/>
    <rect x="69" y="88" width="18" height="2.5" fill="#171c28"/>
    <rect x="69" y="93" width="18" height="2.5" fill="#171c28"/>
    <text x="78" y="118" font-size="11" fill="#c9cbef" text-anchor="middle">MySQL / Syslog</text>

    <!-- arrow 1 -->
    <path d="M125 100 L160 100" stroke="#4a5178" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- Node 2: Logstash -->
    <rect x="164" y="70" width="86" height="60" rx="10" fill="#232941" stroke="#7d3ce2" stroke-width="2"/>
    <path d="M195 85 L195 105 M186 90 L204 90 M186 100 L204 100" stroke="#7d3ce2" stroke-width="3" stroke-linecap="round"/>
    <text x="207" y="118" font-size="11" fill="#c9cbef" text-anchor="middle">Logstash</text>

    <!-- arrow 2 -->
    <path d="M254 100 L289 100" stroke="#4a5178" stroke-width="2.5" marker-end="url(#arrow)"/>

    <!-- Node 3: Kibana/Elasticsearch -->
    <rect x="293" y="70" width="86" height="60" rx="10" fill="#232941" stroke="#facc15" stroke-width="2"/>
    <rect x="313" y="102" width="8" height="12" fill="#facc15"/>
    <rect x="325" y="94" width="8" height="20" fill="#facc15"/>
    <rect x="337" y="86" width="8" height="28" fill="#facc15"/>
    <rect x="349" y="96" width="8" height="18" fill="#facc15"/>
    <text x="336" y="126" font-size="10.5" fill="#c9cbef" text-anchor="middle">ES + Kibana</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5178"/>
    </marker>
  </defs>

  <!-- caption -->
  <rect x="0" y="180" width="400" height="45" fill="#11141f"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#d4d6f9" text-anchor="middle">Log Pipeline + LibreNMS/SNMP Monitoring</text>
</svg>
